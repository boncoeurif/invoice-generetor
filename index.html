<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/logo2.png" />
    <!-- Lock viewport to prevent accidental zooming -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <title>Invoxa</title>
    <style>
      /* Initial Loading Screen Styles */
      #initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #0f172a;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.5s ease, visibility 0.5s;
      }

      .loader-content {
        text-align: center;
      }

      .loader-logo {
        width: 80px;
        height: auto;
        margin-bottom: 20px;
        animation: pulse 2s infinite ease-in-out;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(34, 197, 94, 0.1);
        border-top: 3px solid #22c55e;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto;
      }

      .loader-text {
        color: #fff;
        font-family: sans-serif;
        margin-top: 15px;
        font-size: 14px;
        letter-spacing: 1px;
        font-weight: 300;
        text-transform: uppercase;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.8; }
      }

      /* Hide loader when app is ready */
      .app-loaded #initial-loader {
        opacity: 0;
        visibility: hidden;
      }
      
      /* Global overflow fix */
      html, body {
        overflow-x: hidden;
        position: relative;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="initial-loader">
      <div class="loader-content">
        <img src="/logo2.png" alt="Logo" class="loader-logo">
        <div class="spinner"></div>
        <div class="loader-text">Loading Invoxa...</div>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
